<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSheer Enterprise | Sovereign Web3 ERP</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; --bg: #010409; --card: #0d1117; --border: #30363d; --text: #c9d1d9; --master: #fbbf24; --danger: #f85149; --grey: #8b949e; --success: #3fb950; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; font-size: 13px; overflow: hidden; }
        #gate-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: var(--card); padding: 40px; border-radius: 12px; border: 1px solid var(--neon); width: 420px; text-align: center; box-shadow: 0 0 40px rgba(0,242,255,0.15); max-height: 90vh; overflow-y: auto; }
        .gate-card h1 { font-family: 'Orbitron'; color: var(--neon); margin-bottom: 20px; letter-spacing: 2px; }
        .pass-container { position: relative; width: 100%; }
        .eye-icon { position: absolute; right: 12px; top: 18px; cursor: pointer; user-select: none; font-size: 1.2rem; }
        #main-app { display: none; height: 100vh; flex-direction: column; }
        nav { padding: 15px 30px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .brand { font-family: 'Orbitron'; font-weight: 700; color: var(--neon); }
        .tab-bar { display: flex; background: #161b22; padding: 10px 20px; gap: 10px; border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 18px; cursor: pointer; border-radius: 5px; font-weight: 600; color: #888; transition: 0.3s; font-size: 0.75rem; }
        .tab.active { background: #30363d; color: var(--neon); }
        .content-area { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        h2 { font-family: 'Orbitron'; font-size: 0.8rem; text-transform: uppercase; color: var(--neon); margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        input[type="text"], input[type="password"], input[type="number"], select { width: 100%; padding: 12px; margin: 8px 0; background: #010409; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-neon { background: var(--neon); color: #000; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-grey { background: var(--grey); color: #fff; }
        .btn-staff { background: var(--master); color: #000; }
        .btn-success { background: var(--success); color: #000; }
        .addr-full { font-family: monospace; background: #000; padding: 5px 10px; border-radius: 4px; border: 1px solid var(--border); color: var(--neon); cursor: pointer; font-size: 0.75rem; word-break: break-all; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 0.8rem; }
        .checkbox-group input { width: auto; }
        #video-container, #qr-reader, #op-qr-reader { width: 100%; background: #000; border-radius: 8px; margin: 15px 0; overflow: hidden; border: 1px solid var(--border); min-height: 200px; display: none;}
        #webcam { width: 100%; height: 100%; object-fit: cover; }
        #terminal { background: #000; color: var(--success); font-family: monospace; padding: 15px; border-radius: 8px; height: 150px; overflow-y: auto; font-size: 0.75rem; border: 1px solid var(--border); line-height: 1.4; }
        #qr-display, #lotto-qr-display { background: #fff; padding: 15px; border-radius: 8px; width: fit-content; margin: 20px auto; display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        th { color: #888; text-transform: uppercase; font-size: 0.65rem; }
        .stat-card { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; }
        .stat-val { font-size: 1rem; color: var(--neon); font-weight: bold; font-family: 'Orbitron'; line-height: 1.6; }
        .perm-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; margin-right: 4px; color: #000; }
    </style>
</head>

<div id="gate-overlay">
    <div class="gate-card">
        <h1>SMARTSHEER</h1>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="btn-grey" onclick="switchLoginMode('admin')" style="background: var(--border);">AMMINISTRAZIONE</button>
            <button class="btn-staff" onclick="switchLoginMode('staff')">STAFF (SCAN QR)</button>
        </div>
        
        <div id="login-admin-area">
            <select id="role-selector">
                <option value="master">MASTER GENERALE (Proprietario)</option>
                <option value="client">CLIENT MASTER (Azienda)</option>
                <option value="buyer">BUYER (Acquirente)</option>
            </select>
            <div id="login-section">
                <div class="pass-container">
                    <input type="password" id="gate-pass" placeholder="Password Vault Aziendale">
                    <span class="eye-icon" onclick="togglePass('gate-pass')">👁️</span>
                </div>
            </div>
            <button class="btn-neon" onclick="unlockSystemAdmin()">SBLOCCA CON METAMASK</button>
        </div>
        
        <div id="login-staff-area" style="display: none;">
            <p style="font-size: 0.75rem; color: #888;">Inquadra il QR Code del tuo Badge Aziendale.</p>
            <div id="qr-reader" style="display:block; width: 100%; min-height: 250px;"></div>
            <button class="btn-danger" style="margin-top:15px;" onclick="stopQRScanner()">ANNULLA SCAN</button>
        </div>
        
        <div id="gate-msg" style="margin-top:10px; font-size:0.7rem; color:var(--danger)"></div>
        <a style="cursor:pointer; font-size:0.6rem; color:#444; margin-top:20px; display:block;" onclick="resetDevice()">RIPRISTINA VAULT (Pulisci Dati)</a>
    </div>
</div>

                        <tbody id="global-log-body"></tbody>

            </div>

                <div style="display:flex; gap:10px; margin-bottom:15px;">
