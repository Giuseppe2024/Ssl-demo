<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SHEER LOGISTIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: #00cccc; padding: 20px; }
        .container { max-width: 500px; margin: auto; background-color: #0a0a0a; border: 1px solid #00cccc; box-shadow: 0 0 20px rgba(0, 204, 204, 0.2); padding: 20px; border-radius: 8px; }
        
        h2 { text-align: center; color: #fff; font-size: 1.2em; font-weight: 300; letter-spacing: 2px; text-shadow: 0 0 10px #00cccc; border-bottom: 1px solid #00cccc; padding-bottom: 15px; margin-bottom: 25px; }
        
        input, button { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00cccc; color: #00ffff; box-sizing: border-box; font-size: 16px; border-radius: 4px; }
        input::placeholder { color: #006666; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; color: #050505; background: #00cccc; }
        button:hover { background: #00ffff; box-shadow: 0 0 15px #00cccc; }
        
        #btnSpid { background: #0066cc; color: white; border: 1px solid #0066cc; }
        #btnCie { background: #008080; color: white; border: 1px solid #008080; }
        #btnMint { background: #8247e5; color: white; border: 1px solid #fff; display: none; }
        
        #video { width: 100%; border: 1px solid #00cccc; background: #000; border-radius: 5px; transform: scaleX(-1); margin-top: 10px; display: none; }
        #log { font-family: 'Courier New', monospace; font-size: 12px; height: 150px; overflow-y: auto; border: 1px solid #004444; padding: 10px; background: #000; margin-top: 15px; color: #00cccc; }
        
        .address-box { background: #001a1a; padding: 10px; font-size: 11px; word-break: break-all; margin-top: 10px; border: 1px dashed #00cccc; font-family: 'Courier New', monospace; color: #fff; }
        .token-box { background: #002222; border-color: #00ffff; }
        .alert-box { background: #330000; border: 1px solid #ff0000; color: #ff3333; padding: 10px; font-weight: bold; text-align: center; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <span style="font-size: 2.3em; font-weight: 900; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00cccc; display: inline-block; line-height: 1.1;">
            SMART SHEER<br>LOGISTIC
        </span>
    </div>

    <h2>ONBOARDING ISTITUZIONALE</h2>
    
    <button id="btnSpid" onclick="simulateLogin('SPID')">🔐 ACCEDI CON SPID</button>
    <button id="btnCie" onclick="simulateLogin('CIE 3.0')">💳 ACCEDI CON CIE</button>

    <input type="text" id="cf" placeholder="CODICE FISCALE AD (Da SPID/CIE)" readonly style="color: #669999; background: #0a0a0a;">
    <input type="text" id="pIva" placeholder="PARTITA IVA AZIENDA (11 cifre)">
    <input type="password" id="salt" placeholder="SECRET SALT (Recovery Key)">

    <video id="video" autoplay playsinline></video>
    
    <button id="btnGenera" onclick="generateSBT()">CREA IDENTITÀ BLOCKCHAIN</button>
    <button id="btnMint" onclick="mintOnPolygon()">MINTA SU POLYGON TESTNET</button>

    <div id="log"></div>
    
    <div id="result" class="hidden">
        <div id="blacklistAlert" class="alert-box hidden">
            ⚠️ ALLARME SICUREZZA: Radice in BLACKLIST.<br>Generazione bloccata. Cambiare SALT.
        </div>
        <div id="successData" class="hidden">
            <div class="address-box token-box" id="sbtHashBox"></div>
            <div class="address-box" id="masterAddrBox"></div>
        </div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('log');
    let currentSBT = "";
    let currentMaster = "";

    function log(msg) {
        const div = document.createElement('div');
        div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --- ACCESSO SPID / CIE ---
    async function simulateLogin(method) {
        log(`> Reindirizzamento provider ${method}...`);
        await sleep(1500);
        log(`✅ Autenticazione ${method} completata.`);
        log("> Acquisizione Codice Fiscale...");
        await sleep(1000);
        
        // Compila il CF come nella versione che andava perfetta
        const fintoCF = "RSSMRA80A01H501U";
        document.getElementById('cf').value = fintoCF;
        document.getElementById('cf').style.color = "#00ffff";
        log(`✅ Codice Fiscale inserito: ${fintoCF}`);
    }

    // --- GENERAZIONE SBT ---
    async function generateSBT() {
        const pIva = document.getElementById('pIva').value.trim();
        const cf = document.getElementById('cf').value.trim();
        const salt = document.getElementById('salt').value.trim();

        document.getElementById('result').classList.add('hidden');
        document.getElementById('blacklistAlert').classList.add('hidden');
        document.getElementById('successData').classList.add('hidden');

        if(cf.length !== 16) {
            log("<span style='color:#ff3333;'>❌ ERRORE: Devi prima accedere con SPID o CIE.</span>"); return;
        }
        const regexPIva = /^[0-9]{11}$/;
        if(!regexPIva.test(pIva)) {
            log("<span style='color:#ff3333;'>❌ ERRORE: La Partita IVA deve avere 11 numeri.</span>"); return;
        }
        if(!salt) {
            log("<span style='color:#ff3333;'>❌ ERRORE: Inserisci il SALT di sicurezza.</span>"); return;
        }

        log("> Connessione API Registro Imprese...");
        await sleep(1500);
        log("✅ Visura Camerale OK.");

        const video = document.getElementById('video');
        video.style.display = 'block'; 
        try {
            log("> Richiesta Biometria Liveness...");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            await sleep(2500); 
            log("✅ Scansione completata. Generazione SBT in corso...");
            
            const faceData = "FACE_VECTOR_DATA_SIMULATED"; 
            currentSBT = await sha256(cf + pIva + salt + faceData);
            currentMaster = "0x" + currentSBT.substring(0, 40); 
            
            stream.getTracks().forEach(track => track.stop()); 
            video.style.display = 'none'; 

            log("> Verifica Blacklist...");
            await sleep(1000);

            if(salt.toLowerCase() === "hacker") {
                log("<span style='color:#ff3333;'>❌ ERRORE CRITICO: Identità in BLACKLIST!</span>");
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('blacklistAlert').classList.remove('hidden');
                return;
            }

            log("✅ Master Address Pulito.");

            document.getElementById('result').classList.remove('hidden');
            document.getElementById('successData').classList.remove('hidden');
            
            document.getElementById('sbtHashBox').innerHTML = `<strong>1. SMART IDENTITY CHAIN (SBT Hash):</strong><br>${currentSBT}`;
            document.getElementById('masterAddrBox').innerHTML = `<strong>2. MASTER ADDRESS (Pubblico):</strong><br>${currentMaster}`;
            
            document.getElementById('btnGenera').style.display = 'none'; 
            document.getElementById('btnMint').style.display = 'block';  
            
        } catch (err) {
            log("<span style='color:#ff3333;'>❌ ERRORE CAM: " + err.message + "</span>");
            video.style.display = 'none';
        }
    }

    // --- MINTING POLYGON ---
    async function mintOnPolygon() {
        log("> Inizializzazione Web3 per il Minting...");
        await sleep(2000);
        const fintoTxHash = "0x" + await sha256(Date.now().toString());
        log("✅ SBT MINTATO CON SUCCESSO SUL MASTER ADDRESS!");
        alert("SBT Registrato su Polygon!\nHASH: " + fintoTxHash.substring(0,42));
    }
</script>

</body>
</html>
