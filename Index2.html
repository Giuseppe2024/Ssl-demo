<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSheer v7.0 | Secure Gateway</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; --bg: #010409; --card: #0d1117; --border: #30363d; --master: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #c9d1d9; margin: 0; overflow: hidden; }

        /* --- IL TORNELLO (GATE) --- */
        #gate-overlay { 
            position: fixed; inset: 0; background: var(--bg); z-index: 10000; 
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .gate-card { 
            background: var(--card); padding: 40px; border-radius: 15px; 
            border: 1px solid var(--border); width: 100%; max-width: 420px; 
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1); text-align: center;
        }
        .gate-card h1 { font-family: 'Orbitron'; color: var(--neon); font-size: 1.5rem; margin-bottom: 25px; }
        
        input, select { 
            width: 100%; padding: 14px; margin: 10px 0; background: #010409; 
            border: 1px solid var(--border); color: #fff; border-radius: 8px; font-size: 0.9rem;
        }
        input:focus { border-color: var(--neon); outline: none; }

        .btn-gate { 
            width: 100%; padding: 16px; background: var(--neon); color: #000; 
            border: none; border-radius: 8px; font-weight: 800; cursor: pointer; 
            text-transform: uppercase; margin-top: 15px; transition: 0.3s;
        }
        .btn-gate:hover { box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); transform: translateY(-2px); }

        /* --- DASHBOARD MODULARE --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        nav { padding: 15px 30px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .tab-bar { display: flex; background: #161b22; padding: 10px 20px; gap: 10px; border-bottom: 1px solid var(--border); }
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 5px; font-size: 0.8rem; font-weight: 600; color: #888; transition: 0.3s; }
        .tab.active { background: #30363d; color: var(--neon); border-bottom: 2px solid var(--neon); }

        .content-area { flex: 1; padding: 30px; overflow-y: auto; }
        .panel { display: none; }
        .panel.active { display: block; }

        .card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        #log { background: #000; color: #3fb950; font-family: monospace; padding: 15px; border-radius: 8px; font-size: 0.7rem; margin-top: 20px; }
    </style>
</head>
<body>

<div id="gate-overlay">
    <div class="gate-card">
        <h1>SMARTSHEER 2026</h1>
        <p style="font-size: 0.8rem; color: #8b949e; margin-bottom: 20px;">Sincronizza Identità & Sblocca Vault</p>
        
        <label style="display:block; text-align:left; font-size: 0.7rem; color: var(--neon);">1. SELEZIONA RUOLO</label>
        <select id="role-selector">
            <option value="none">-- Scegli la tua funzione --</option>
            <option value="admin">MASTER GENERALE (Proprietario)</option>
            <option value="client">CLIENT MASTER (Azienda)</option>
            <option value="staff">STAFF (Magazziniere)</option>
        </select>

        <label style="display:block; text-align:left; font-size: 0.7rem; color: var(--neon); margin-top:15px;">2. PASSWORD DI DECRIPTAZIONE</label>
        <input type="password" id="master-pass" placeholder="Inserisci la tua Master Password">

        <button class="btn-gate" onclick="unlockSystem()">COLLEGA METAMASK & SBLOCCA</button>
        
        <div id="gate-status" style="margin-top:15px; font-size:0.7rem; color:#f85149;"></div>
    </div>
</div>

<div id="main-app">
    <nav>
        <div style="font-family:'Orbitron'; font-weight:700; color:var(--neon)">SMARTSHEER <span id="tag-ruolo" style="font-size:0.6rem; color:#8b949e"></span></div>
        <div id="user-address" style="font-family:monospace; font-size:0.75rem; background:#161b22; padding:5px 12px; border-radius:20px;"></div>
    </nav>

    <div class="tab-bar" id="nav-tabs">
        </div>

    <div class="content-area" id="main-content">
        <div id="panel-onboarding" class="panel">
            <div class="card">
                <h2>🛡️ Registrazione Identità (SBT)</h2>
                <p>Nessun Soulbound Token trovato. Crea ora la tua Identità Aziendale.</p>
                <input type="text" id="reg-piva" placeholder="P.IVA Aziendale">
                <button class="btn-gate" onclick="mintIdentitySBT()">CONIA SBT IDENTITÀ</button>
            </div>
        </div>

        <div id="panel-factory" class="panel">
            <div class="card">
                <h2>🚀 Factory: Generazione NFT</h2>
                <input type="text" id="nft-name" placeholder="Nome (es. Rolex)">
                <input type="number" id="nft-qty" placeholder="Quantità">
                <button class="btn-gate" onclick="coniaLotto()">GENERA CARICO NEL VAULT</button>
            </div>
        </div>

        <div id="panel-staff" class="panel">
            <div class="card">
                <h2>👥 Gestione Team</h2>
                <input type="text" id="worker-name" placeholder="Nome Magazziniere">
                <button class="btn-gate" style="background:var(--master)" onclick="createWorkerQR()">GENERA QR LOGIN</button>
            </div>
        </div>
    </div>

    <div id="log">> Sistema pronto. Log di sicurezza attivo.</div>
</div>

<script>
    let currentRole = "";
    let userWallet = "";
    let encryptionKey = ""; // Questa sarà la nostra Master Key generata

    async function unlockSystem() {
        const role = document.getElementById('role-selector').value;
        const pass = document.getElementById('master-pass').value;

        if (role === "none" || pass.length < 4) {
            document.getElementById('gate-status').innerText = "Errore: Seleziona ruolo e password valida.";
            return;
        }

        if (window.ethereum) {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const accounts = await provider.send("eth_requestAccounts", []);
                userWallet = accounts[0];
                const signer = provider.getSigner();

                // LA MAGIA: Firma deterministica basata sulla password
                // Questo crea il nostro "Seme" di privacy che non esiste sulla blockchain
                const msg = `SmartSheer_Auth_${pass}_2026`;
                const signature = await signer.signMessage(msg);
                encryptionKey = ethers.utils.keccak256(signature);

                document.getElementById('gate-overlay').style.display = "none";
                document.getElementById('main-app').style.display = "flex";
                setupDashboard(role);
                
                log(`Sblocco effettuato come ${role.toUpperCase()}.`);
                log(`Vault Key Derivata: ${encryptionKey.substring(0,10)}...`);

            } catch (err) {
                document.getElementById('gate-status').innerText = "MetaMask: Accesso negato o firma annullata.";
            }
        }
    }

    function setupDashboard(role) {
        currentRole = role;
        document.getElementById('tag-ruolo').innerText = role.toUpperCase();
        document.getElementById('user-address').innerText = userWallet;
        
        const tabs = document.getElementById('nav-tabs');
        tabs.innerHTML = "";

        if(role === "client") {
            addTab("IDENTITÀ", "panel-onboarding");
            addTab("FACTORY NFT", "panel-factory");
            addTab("GESTIONE STAFF", "panel-staff");
            showPanel("panel-onboarding");
        }
        // Aggiungi qui gli altri ruoli...
    }

    function addTab(label, panelId) {
        const t = document.createElement("div");
        t.className = "tab";
        t.innerText = label;
        t.onclick = (e) => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            e.target.classList.add('active');
            showPanel(panelId);
        };
        document.getElementById('nav-tabs').appendChild(t);
    }

    function showPanel(id) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function log(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<br>> ${m}`;
    }
</script>
</body>
</html>
