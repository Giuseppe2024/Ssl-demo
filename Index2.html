<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL - Web3 Identity Mint</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0f0f0f; color: #00ff00; padding: 20px; }
        .container { max-width: 500px; margin: auto; border: 1px solid #00ff00; padding: 20px; box-shadow: 0 0 15px #00ff00; }
        h2 { text-align: center; border-bottom: 1px solid #00ff00; padding-bottom: 10px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; background: #1a1a1a; border: 1px solid #00ff00; color: #00ff00; box-sizing: border-box; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: #00ff00; color: #000; }
        #btnMint { background: #8247e5; color: white; border: 1px solid #fff; display: none; } /* Colore Polygon */
        #btnMint:hover { background: #6b38c2; }
        #video { width: 100%; border: 1px solid #444; background: #000; border-radius: 5px; transform: scaleX(-1); }
        #log { font-size: 12px; height: 150px; overflow-y: auto; border: 1px solid #333; padding: 10px; background: #050505; }
        .address-box { background: #003300; padding: 10px; font-size: 11px; word-break: break-all; margin-top: 10px; border: 1px dashed #00ff00; }
        .token-box { background: #330000; border-color: #ff0000; } /* Riquadro per l'Opera d'Arte */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>SSL - WEB3 MINTING</h2>
    
    <input type="text" id="pIva" placeholder="PARTITA IVA AZIENDA">
    <input type="text" id="cf" placeholder="CODICE FISCALE AD">
    <input type="password" id="salt" placeholder="SECRET SALT (Recovery)">
    <input type="text" id="txId" placeholder="ID SPEDIZIONE (es. BANCALE-001)">

    <video id="video" autoplay playsinline></video>
    
    <button onclick="startVerification()">1. GENERA IDENTITÀ</button>
    <button id="btnMint" onclick="mintOnPolygon()">2. MINTA SU POLYGON TESTNET</button>

    <div id="log"></div>
    
    <div id="result" class="hidden">
        <div class="address-box token-box" id="sbtHashBox"></div>
        <div class="address-box" id="masterAddrBox"></div>
        <div class="address-box" id="txAddrBox" style="background: #331a00; border-color: #ff9900;"></div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('log');
    let currentSBT = "";
    let currentMaster = "";

    function log(msg) {
        const div = document.createElement('div');
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function startVerification() {
        const pIva = document.getElementById('pIva').value;
        const cf = document.getElementById('cf').value;
        const salt = document.getElementById('salt').value;
        const txId = document.getElementById('txId').value || "TX-DEFAULT-001";

        if(!pIva || !cf || !salt) {
            log("❌ ERRORE: Compila P.IVA, CF e Salt.");
            return;
        }

        const video = document.getElementById('video');
        try {
            log("> Richiesta Biometria...");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            await new Promise(r => setTimeout(r, 2000)); // Simula scansione
            log("✅ Scansione completata. Generazione crittografica...");
            
            // 1. GENERAZIONE "OPERA D'ARTE" (Hash SBT)
            const faceData = "FACE_VECTOR_DATA_SIMULATED"; 
            currentSBT = await sha256(cf + pIva + salt + faceData);
            
            // 2. GENERAZIONE "CASSAFORTE" (Master Address pubblico)
            // Prendiamo i primi 40 caratteri dell'SBT e ci mettiamo 0x
            currentMaster = "0x" + currentSBT.substring(0, 40); 

            // 3. GENERAZIONE INDIRIZZO "USA E GETTA"
            const txSeed = await sha256(currentSBT + txId);
            const transactionAddress = "0x" + txSeed.substring(0, 40);

            // OUTPUT
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('sbtHashBox').innerHTML = `<strong>OPERA D'ARTE (Hash SBT Segreto):</strong><br>${currentSBT}`;
            document.getElementById('masterAddrBox').innerHTML = `<strong>CASSAFORTE (Master Address Pubblico):</strong><br>${currentMaster}`;
            document.getElementById('txAddrBox').innerHTML = `<strong>INDIRIZZO USA E GETTA (Spedizione ${txId}):</strong><br>${transactionAddress}`;
            
            document.getElementById('btnMint').style.display = 'block'; // Mostra tasto Mint
            log("🚀 Identità creata. Pronta per il Minting.");
            
            stream.getTracks().forEach(track => track.stop());

        } catch (err) {
            log("❌ ERRORE CAM: " + err.message);
        }
    }

    // --- LOGICA WEB3 PER MINT SU POLYGON ---
    async function mintOnPolygon() {
        log("> Inizializzazione Web3...");
        
        // Verifica se c'è un wallet (es. MetaMask) nel browser
        if (typeof window.ethereum !== 'undefined') {
            try {
                // Richiedi connessione al Wallet
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const addressWallet = await signer.getAddress();
                
                log("🦊 Connesso al Wallet: " + addressWallet);
                log("⏳ Preparazione transazione su Polygon Testnet...");

                // QUI ANDREBBE IL TUO SMART CONTRACT REALE
                // const contractAddress = "0xTuoContratto...";
                // const abi = [...];
                // const contract = new ethers.Contract(contractAddress, abi, signer);
                // const tx = await contract.mintSBT(currentMaster, currentSBT);
                
                // SIMULAZIONE DI ATTESA DELLA BLOCKCHAIN (Per la demo)
                await new Promise(r => setTimeout(r, 3000));
                
                const fintoTxHash = "0x" + await sha256(Date.now().toString());
                log("✅ MINT COMPLETATO CON SUCCESSO!");
                log("🔗 TxHash: " + fintoTxHash.substring(0,42));
                alert("SBT Mintato su Polygon! Hash Transazione:\n" + fintoTxHash.substring(0,42));

            } catch (error) {
                log("❌ Transazione annullata o fallita: " + error.message);
            }
        } else {
            // FALLBACK PER LA DEMO SE NON C'E' METAMASK NEL TELEFONO
            log("⚠️ MetaMask non rilevato nel browser.");
            log("⏳ Esecuzione Minting tramite Server Relayer di backup...");
            await new Promise(r => setTimeout(r, 2500));
            log("✅ MINT COMPLETATO VIA RELAYER (Polygon Testnet)!");
            alert("Operazione completata con successo tramite server di backup aziendale.");
        }
    }
</script>

</body>
</html>
