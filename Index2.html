        /* Stile Titoli */
        h2 { text-align: center; color: #fff; font-size: 1.2em; font-weight: 300; letter-spacing: 2px; text-shadow: 0 0 10px #00cccc; border-bottom: 1px solid #00cccc; padding-bottom: 15px; margin-bottom: 25px; }
        
        input, button { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00cccc; color: #00ffff; box-sizing: border-box; font-size: 16px; border-radius: 4px; }
        input::placeholder { color: #006666; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; color: #050505; background: #00cccc; }
        button:hover { background: #00ffff; box-shadow: 0 0 15px #00cccc; }
        
        /* Bottoni Login Istituzionali */
        #btnSpid { background: #0066cc; color: white; border: 1px solid #0066cc; }

        #btnCie { background: #008080; color: white; border: 1px solid #008080; }
        #btnCie:hover { background: #006666; border-color: #fff; box-shadow: 0 0 10px #008080; }
        
        /* Bottone Polygon */
        #btnMint { background: #8247e5; color: white; border: 1px solid #fff; display: none; }
        #btnMint:hover { background: #6b38c2; box-shadow: 0 0 15px #8247e5; }
        
        #video { width: 100%; border: 1px solid #00cccc; background: #000; border-radius: 5px; transform: scaleX(-1); margin-top: 10px; display: none; }
        #log { font-family: 'Courier New', monospace; font-size: 12px; height: 150px; overflow-y: auto; border: 1px solid #004444; padding: 10px; background: #000; margin-top: 15px; color: #00cccc; }
        
        /* Riquadri */
        .address-box { background: #001a1a; padding: 10px; font-size: 11px; word-break: break-all; margin-top: 10px; border: 1px dashed #00cccc; font-family: 'Courier New', monospace; color: #fff; }
        .token-box { background: #002222; border-color: #00ffff; }
        .alert-box { background: #330000; border: 1px solid #ff0000; color: #ff3333; padding: 10px; font-weight: bold; text-align: center; margin-top: 10px; }
        
        /* Classe per nascondere gli elementi - con important per evitare conflitti */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div style="text-align: center; margin-bottom: 25px;">

    </div>

    <h2>ONBOARDING ISTITUZIONALE</h2>

    </div>
</div>
