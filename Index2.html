<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART SHEER LOGISTIC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050505; color: #00cccc; padding: 20px; }
        .container { max-width: 500px; margin: auto; background-color: #0a0a0a; border: 1px solid #00cccc; box-shadow: 0 0 20px rgba(0, 204, 204, 0.2); padding: 20px; border-radius: 8px; }
        
        h2 { text-align: center; color: #fff; font-size: 1.2em; font-weight: 300; letter-spacing: 2px; text-shadow: 0 0 10px #00cccc; border-bottom: 1px solid #00cccc; padding-bottom: 15px; margin-bottom: 25px; }
        
        input, button { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #00cccc; color: #00ffff; box-sizing: border-box; font-size: 16px; border-radius: 4px; }
        input::placeholder { color: #006666; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; color: #050505; background: #00cccc; border: none; }
        
        #btnSpid { background: #0066cc; color: white; }
        #btnCie { background: #008080; color: white; }
        
        #video { width: 100%; border: 1px solid #00cccc; background: #000; border-radius: 5px; transform: scaleX(-1); margin-top: 10px; }
        #log { font-family: 'Courier New', monospace; font-size: 12px; height: 150px; overflow-y: auto; border: 1px solid #004444; padding: 10px; background: #000; margin-top: 15px; color: #00cccc; }
        
        .address-box { background: #001a1a; padding: 10px; font-size: 11px; word-break: break-all; margin-top: 10px; border: 1px dashed #00cccc; font-family: 'Courier New', monospace; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    
    <div style="text-align: center; margin-bottom: 25px;">
        <span style="font-size: 2.3em; font-weight: 900; letter-spacing: 1px; color: #fff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00cccc; display: inline-block; line-height: 1.1;">
            SMART SHEER<br>LOGISTIC
        </span>
    </div>

    <h2>ONBOARDING ISTITUZIONALE</h2>
    
    <div id="fase1">
        <p style="text-align: center; font-size: 14px; color: #88bbbb;">Seleziona autenticazione:</p>
        <button id="btnSpid" onclick="avviaLogin('SPID')">🔐 ACCEDI CON SPID</button>
        <button id="btnCie" onclick="avviaLogin('CIE 3.0')">💳 ACCEDI CON CIE</button>
    </div>

    <div id="fase2" style="display: none;">
        <p style="text-align: center; color: #00ffff; font-weight: bold;" id="msgSuccesso"></p>
        
        <input type="text" id="cf" readonly style="color: #669999; background: #0a0a0a;">
        <input type="text" id="pIva" placeholder="PARTITA IVA AZIENDA (11 cifre)">
        <input type="password" id="salt" placeholder="SECRET SALT">

        <video id="video" autoplay playsinline style="display: none;"></video>
        
        <button id="btnGenera" onclick="generaIdentita()">CREA IDENTITÀ BLOCKCHAIN</button>
        <button id="btnMint" onclick="minta()" style="display: none; background: #8247e5; color: white;">MINTA SU POLYGON TESTNET</button>
    </div>

    <div id="log"></div>
    
    <div id="risultati" style="display: none;">
        <div id="allarme" style="display: none; background: #330000; border: 1px solid #ff0000; color: #ff3333; padding: 10px; font-weight: bold; text-align: center; margin-top: 10px;">
            ⚠️ ALLARME SICUREZZA: Identità in BLACKLIST!
        </div>
        <div id="datiBuoni" style="display: none;">
            <div class="address-box" style="border-color: #00ffff; background: #002222;" id="boxHash"></div>
            <div class="address-box" id="boxMaster"></div>
        </div>
    </div>
</div>

<script>
    const logDiv = document.getElementById('log');

    function scriviLog(msg) {
        logDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    const pausa = ms => new Promise(r => setTimeout(r, ms));

    async function creaHash(testo) {
        const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(testo));
        return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // --- MAGIA INFALLIBILE CAMBIO SCHERMATA ---
    async function avviaLogin(metodo) {
        scriviLog(`> Connessione al gateway ${metodo}...`);
        await pausa(1500);
        scriviLog(`✅ Autenticazione ${metodo} completata.`);
        
        document.getElementById('fase1').style.display = 'none';
        document.getElementById('fase2').style.display = 'block';
        
        const cfFinto = "RSSMRA80A01H501U";
        document.getElementById('cf').value = cfFinto;
        document.getElementById('msgSuccesso').innerText = `✅ Accesso effettuato via ${metodo}`;
        scriviLog(`✅ CF Amministratore caricato.`);
    }

    // --- GENERAZIONE IDENTITÀ ---
    async function generaIdentita() {
        const pIva = document.getElementById('pIva').value.trim();
        const cf = document.getElementById('cf').value.trim();
        const salt = document.getElementById('salt').value.trim();

        document.getElementById('risultati').style.display = 'none';
        document.getElementById('allarme').style.display = 'none';
        document.getElementById('datiBuoni').style.display = 'none';

        if(pIva.length !== 11) { scriviLog("<span style='color:#ff3333;'>❌ ERRORE: P.IVA deve avere 11 numeri.</span>"); return; }
        if(!salt) { scriviLog("<span style='color:#ff3333;'>❌ ERRORE: Inserisci il SALT.</span>"); return; }

        scriviLog("> Verifica Registro Imprese Infocamere...");
        await pausa(1000);
        scriviLog("✅ Visura Camerale verificata.");

        const video = document.getElementById('video');
        video.style.display = 'block'; 

        try {
            scriviLog("> Controllo Biometrico...");
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
            video.srcObject = stream;
            await pausa(2500); 
            scriviLog("✅ Biometria acquisita. Calcolo crittografico in corso...");
            
            const hash = await creaHash(cf + pIva + salt + "FACE_SIM");
            const master = "0x" + hash.substring(0, 40); 
            
            stream.getTracks().forEach(t => t.stop()); 
            video.style.display = 'none'; 

            scriviLog("> Interrogazione Gatekeeper (Blacklist)...");
            await pausa(1000);

            document.getElementById('risultati').style.display = 'block';

            if(salt.toLowerCase() === "hacker") {
                scriviLog("<span style='color:#ff3333;'>❌ BLOCCATO: Radice compromessa!</span>");
                document.getElementById('allarme').style.display = 'block';
                return;
            }

            scriviLog("✅ Nessuna anomalia. Generazione completata.");
            document.getElementById('datiBuoni').style.display = 'block';
            
            document.getElementById('boxHash').innerHTML = `<strong>1. SMART IDENTITY CHAIN (SBT Hash):</strong><br>${hash}`;
            document.getElementById('boxMaster').innerHTML = `<strong>2. MASTER ADDRESS (Pubblico):</strong><br>${master}`;
            
            document.getElementById('btnGenera').style.display = 'none'; 
            document.getElementById('btnMint').style.display = 'block';  

        } catch (err) {
            scriviLog("<span style='color:#ff3333;'>❌ ERRORE CAM: " + err.message + "</span>");
            video.style.display = 'none';
        }
    }

    // --- MINTING SU POLYGON (CON FURBATA PER MOBILE) ---
    async function minta() {
        scriviLog("> Inizializzazione Web3 per il Minting...");
        
        if (typeof window.ethereum !== 'undefined') {
            try {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                await pausa(2000);
                const fintoTxHash = "0x" + await creaHash(Date.now().toString());
                scriviLog("✅ SMART IDENTITY REGISTRATA CON SUCCESSO SULLA BLOCKCHAIN!");
                alert("SBT Registrato su Polygon!\nHASH: " + fintoTxHash.substring(0,42));
            } catch (error) {
                scriviLog("<span style='color:#ff3333;'>❌ Transazione fallita: " + error.message + "</span>");
            }
        } else {
            scriviLog("⚠️ Nessun wallet Web3 rilevato nel browser.");
            scriviLog("⏳ Esecuzione Gasless Minting tramite Server Relayer Aziendale...");
            await pausa(2500);
            scriviLog("✅ MINT COMPLETATO VIA RELAYER (Polygon Testnet)!");
            alert("Operazione completata con successo tramite relayer aziendale. Fee pagate dal sistema.");
        }
    }
</script>

</body>
</html>
